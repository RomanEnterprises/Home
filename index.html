<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Roman Enterprises</title>
    <style>
        :root{
            --bg:#eaf6fb;
            --muted:#5a7ca7;
            --accent:#4bb6f4;
            --card:#ffffff;
            --glass: rgba(75,182,244,0.08);
            --radius:14px;
            --max-width:1200px;
            --gap:28px;
            color-scheme: light;
        }

        html,body{height:100%;}
        body{
            margin:0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial;
            background:var(--bg);
            color: #093c80;
            -webkit-font-smoothing:antialiased;
            -moz-osx-font-smoothing:grayscale;
        }

        header{
            position:fixed;
            left:0;right:0;top:0;
            display:flex;align-items:center;justify-content:space-between;
            padding:18px 36px;
            backdrop-filter:blur(6px);
            background: #4bb6f4;
            z-index:40;
        }

        .brand{display:flex;align-items:center;gap:14px}
        .logo{width:36px;height:36px;border-radius:8px;background:linear-gradient(135deg,#1e3a8a,#06b6d4);box-shadow:0 6px 20px rgba(2,6,23,0.6);}
        .brand h1{font-size:18px;margin:0;font-weight:600;letter-spacing:0.4px}

        nav{display:flex;gap:20px;align-items:center}
        nav a{color:var(--muted);text-decoration:none;font-weight:600;padding:8px 12px;border-radius:8px}
        nav a:hover{color:#fff;background:var(--glass)}
