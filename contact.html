<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | Roman Enterprises</title>
  <style>
    :root{
      --bg:#4dc4f7;
      --muted:#3a5a7a;
      --accent:#4bb6f4;
      --card:#ffffff;
      --glass: rgba(75,182,244,0.08);
      --radius:14px;
      --max-width:900px;
      color-scheme: light;
    }
    html,body{height:100%;}
    body{
      margin:0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial;
      background:var(--bg);
      color: #093c80;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
    }
    header{
      position:fixed;
      left:0;right:0;top:0;
      display:flex;align-items:center;justify-content:space-between;
      padding:18px 36px;
      backdrop-filter:blur(6px);
      background: #4bb6f4;
      z-index:40;
    }
    .brand{display:flex;align-items:center;gap:14px}
    .logo-object{width:220px;height:auto;border-radius:0px;box-shadow:0 6px 20px rgba(2,6,23,0.06);background:#fff;}
    nav{display:flex;gap:32px;align-items:center;justify-content:center;flex:1;}
    nav a{color:#fff;text-decoration:none;font-weight:600;padding:10px 18px;border-radius:8px;font-size:1.1em;transition:background 0.2s;}
    nav a:hover{background:var(--accent);color:#fff;}
    .hero{
      min-height:40vh;
      display:flex;align-items:center;justify-content:flex-start;text-align:left;padding:120px 20px 40px 0;
      background: #fff;
      position:relative;
    }
    .hero-inner{
      max-width:540px;
      margin-left:8vw;
      z-index:2;
    }
    .ctas{display:flex;gap:18px;justify-content:flex-start;flex-wrap:wrap;margin-top:24px;}
    .btn{background:var(--accent);color:#fff;padding:14px 28px;border-radius:10px;text-decoration:none;font-weight:700;font-size:1.1em;box-shadow:0 2px 8px rgba(75,182,244,0.10);transition:background 0.2s;}
    .btn:hover{background:#349edb;}
    .btn.ghost{background:transparent;border:2px solid var(--accent);color:var(--accent);}
    .btn.ghost:hover{background:var(--accent);color:#fff;}
    main{max-width:var(--max-width);margin:40px auto;padding:0 20px}
    section{margin-bottom:2em;}
    h1{font-size:2.5rem;margin-bottom:0.5em}
    .contact-form{margin-top:2em;max-width:400px}
    input,textarea{width:100%;padding:10px;margin-top:10px;margin-bottom:15px;border:1px solid #b3d8f7;border-radius:5px;font-size:1rem;background:#eaf6fb;}
    button{background:#4bb6f4;color:white;border:none;padding:12px 25px;border-radius:5px;font-size:16px;cursor:pointer;}
    button:hover{background:#349edb;}
    footer{padding:30px 20px;text-align:center;color:var(--muted);margin-top:60px}
  </style>
</head>
<body>
  <header>
    <div class="brand">
      <img class="logo-object" src="Roman Enterprises Logo.svg" alt="Roman Enterprises Logo" />
    </div>
    <nav>
      <a href="index.html">Home</a>
      <a href="rocketry.html">Rocketry</a>
      <a href="engineering.html">Engineering</a>
      <a href="environmental.html">Environmental</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>
  <section class="hero">
    <div class="hero-inner">
      <h1>Contact</h1>
      <p>For partnership, media, or collaboration inquiries, please email <a href="mailto:romanenterprisesinbox@gmail.com" style="color:var(--accent)">romanenterprisesinbox@gmail.com</a></p>
    </div>
  </section>
  <main>
    <h1>Contact</h1>
    <p>For partnership, media, or collaboration inquiries, please email <a href="mailto:romanenterprisesinbox@gmail.com" style="color:#0ea5a4">romanenterprisesinbox@gmail.com</a></p>
    <form class="contact-form">
      <input type="text" placeholder="Your Name" required>
      <input type="email" placeholder="Email Address" required>
      <textarea rows="5" placeholder="Your Message"></textarea>
      <button type="submit">Send Message</button>
    </form>
  </main>
  <footer>
    <p>© 2026 Roman Enterprises</p>
  </footer>
</body>
</html>
